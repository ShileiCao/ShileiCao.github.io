name: Update Google Scholar Citations

on:
  schedule:
    - cron: '0 0 * * *' # 每天 UTC 时间 0 点（北京时间早上 8 点）自动运行一次
  workflow_dispatch: # 允许手动点击运行

jobs:
  update-citations:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🌟 核心魔法：直接使用底层的 curl 命令请求 API，并通过 jq 工具精准提取引用数字 
      - name: Fetch from SerpApi and extract citations
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          # 发送请求并将结果存入临时文件
          curl -s "https://serpapi.com/search.json?engine=google_scholar_author&author_id=-bCjtakAAAAJ&api_key=${SERPAPI_KEY}" > temp.json
          
          # 使用 jq 从 temp.json 中提取 all citations 的数字
          # jq 会根据你提供的 JSON 结构: .cited_by.table[0].citations.all 找到 87
          CITATIONS=$(jq -r '.cited_by.table[0].citations.all' temp.json)
          
          echo "成功抓取到引用量: $CITATIONS"
          
          # 确保 public 文件夹存在
          mkdir -p public
          
          # 组装成 Astro 页面需要的格式并保存
          echo "{\"citations\": $CITATIONS}" > public/citations.json
          
          # 打印一下生成的文件内容确认无误
          cat public/citations.json

      - name: Commit and push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add public/citations.json || true
          # 只有当引用量真的发生变化时，才会触发 Git 提交，避免制造多余的 commit
          git commit -m "Auto-update citations count to latest" || exit 0
          git push